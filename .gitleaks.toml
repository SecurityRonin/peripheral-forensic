# gitleaks configuration — extends the default ruleset and allowlists known
# false positives. CI cache keys are not secrets; gitleaks' generic-api-key rule
# flags on entropy alone. Scoped to the cache-key pattern so real secrets still
# surface.
[extend]
useDefault = true

[allowlist]
description = "CI cache keys are not secrets"
regexes = [
  '''corpus-peripheral-v[0-9]+''',
]
